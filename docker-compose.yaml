services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-risk-mysql
    restart: unless-stopped
    environment:
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ecommerce_risk_control
      MYSQL_USER: risk_user
      MYSQL_PASSWORD: risk_pass123
      TZ: Asia/Shanghai
    ports:
      - "13307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/ecommerce_risk_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/sql/ecommerce_risk_seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-risk-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: risk_user
      DB_PASSWORD: risk_pass123
      DB_NAME: ecommerce_risk_control
      AI_MOCK: "true"
      LLM_MODEL: "qwen-plus-2025-12-01"
      LLM_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      LLM_API_KEY: "sk-5a0a81401f0740ca963115bfca78c0cf"
      AUTH_SECRET: ecommerce-risk-compose-secret
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      BOOTSTRAP_ADMIN_TOKEN: ""
      TZ: Asia/Shanghai
    ports:
      - "9400:9400"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9400/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-risk-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
